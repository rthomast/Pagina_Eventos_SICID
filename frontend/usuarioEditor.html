<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/usuarioEditor.css">

    <title>Usuario Editor</title>

</head>

<body>

    <!-- Topbar -->
    <section class="container-fluid topbar">
        <div class="row d-flex align-items-center h-100">

            <div class="col-3"> <!-- Logo -->
                <a href="" class="logo text-white text-decoration-none">
                    <span class="visually-hidden">Inicio -</span>
                    Sicid <small>intranet</small>
                </a>
            </div>

            <div class="col-6"> <!-- Usuario / rol -->
                <p class="mb-0">
                    <strong>NOTICIAS • </strong>
                    <span class="visually-hidden">Rol:</span>Editor
                </p>
            </div>

            <div class="col-3"> <!-- Otras opciones de configuracion -->
                <div class="row d-flex align-items-center justify-content-around">
                    <div class="col-3 d-flex align-items-center justify-content-end"> <!-- - A + -->
                        <button class="btn">
                            <i class="fa-solid fa-minus border p-2 me-2"></i>
                        </button>

                        <button class="btn">
                            <i class="fa-solid fa-a border p-2 me-2"></i>
                        </button>

                        <button class="btn">
                            <i class="fa-solid fa-plus border p-2 me-2"></i>
                        </button>

                    </div>

                    <!-- Contraste -->
                    <div class="col-1">
                        <button class="btn">
                            <i class="fa-solid fa-circle-half-stroke border p-2 me-2"></i>
                        </button>
                    </div>

                    <!-- Notificaciones -->
                    <div class="col-1">
                        <button class="btn">
                            <i class="fa-solid fa-bell p-2 me-2"></i>
                        </button>
                    </div>

                    <!-- Usuario -->
                    <div class="col-1">
                        <span class="border rounded-circle px-2 py-2">MC</span>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!--Layout principal-->
    <main class="container-fluid">
        <div class="row">

            <!-- Barra lateral -->
            <section class="col-2 sidebar p-0">

                <div class="p-3">

                    <h1 class="h4"><strong>Eventos</strong></h1>

                    <ul class="list-unstyled sideBar">
                        <li class="sideBar">
                            <a href="/frontend/usuarioEditorCrearEvento.html" class="text-decoration-none">
                                Crear Evento
                            </a>
                        </li>

                        <li>
                            <a href="/frontend/usuarioEditorPublicados.html" class="text-decoration-none mb-3">
                                Eventos Publicados
                            </a>
                        </li>

                        <li>
                            <a href="" class="text-decoration-none mb-3">
                                Eventos en Borrador
                            </a>
                        </li>

                        <li>
                            <a href="" class="text-decoration-none mb-3">
                                Eventos Finalizados
                            </a>
                        </li>
                    </ul>

                    <h1 class="h4"><strong>Usuarios</strong></h1>

                    <ul class="list-unstyled sideBar">
                        <li>
                            <a href="" class="text-decoration-none">
                                Crear lista de difucion
                            </a>
                        </li>

                        <li>
                            <a href="" class="text-decoration-none mb-3">
                                Lista de difusion
                            </a>
                        </li>

                        <li>
                            <a href="" class="text-decoration-none mb-3">
                                Suscriptores
                            </a>
                        </li>

                        <li>
                            <a href="" class="text-decoration-none mb-3">
                                Consultas
                            </a>
                        </li>
                    </ul>
                </div>
            </section>

            <!--Contenido principal-->
            <div class="col-10">



            </div>

        </div>

    </main>


</body>

</html>
